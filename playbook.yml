---
- name: Install and configure Nginx
  hosts: web
  become: yes

  tasks:

    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Create index.html with Hello Ansible
      copy:
        content: "<h1>Hello Ansible</h1>"
        dest: /usr/share/nginx/html/index.html